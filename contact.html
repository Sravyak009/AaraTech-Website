<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - AaraTech</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:15px;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
    gap:15px;
    padding:0;
}

nav ul li a{
    color:rgb(255, 255, 255);
    text-decoration:none;
}

.page-banner{
    text-align:center;
    padding:40px;
    background:#f4f4f4;
}

.content-section{
    padding:30px;
}

form{
    max-width:500px;
    margin-bottom:30px;
}

input,
textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<header>

<div class="logo">AaraTech</div>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="industries.html">Industries</a></li>
<li><a href="portfolio.html">Portfolio</a></li>
<li><a href="careers.html">Careers</a></li>
<li><a href="blog.html">Blog</a></li>
<li><a href="contact.html">Contact</a></li>
 <li><a href="admin.html">admin</a></li>
</ul>
</nav>

</header>

<section class="page-banner">
<h1>Contact Us</h1>
</section>

<section class="content-section">

<h2>Contact Form</h2>

<form id="contactForm">

<input
type="text"
id="name"
placeholder="Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<textarea
id="message"
placeholder="Message"
required></textarea>

<button type="submit">
Send Message
</button>

</form>

<p
id="successMessage"
style="color:green;font-weight:bold;">
</p>

<hr>

<h2>Lead Capture Form</h2>

<form id="leadForm">

<input
type="text"
id="leadName"
placeholder="Name"
required>

<input
type="email"
id="leadEmail"
placeholder="Email"
required>

<input
type="text"
id="leadPhone"
placeholder="Phone Number"
required>

<input
type="text"
id="leadCompany"
placeholder="Company Name"
required>

<button type="submit">
Submit Lead
</button>

</form>

<p
id="leadMessage"
style="color:green;font-weight:bold;">
</p>

<h3>Address</h3>

<p>
AaraTech Solutions Pvt Ltd<br>
Chennai, Tamil Nadu, India
</p>

</section>

<footer>
<p>© 2026 AaraTech Solutions</p>
</footer>

<script>

/* CONTACT FORM */

document.getElementById("contactForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
message:document.getElementById("message").value
};

try{

const response=await fetch(
"http://localhost:5000/api/contact",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

const result=await response.json();

document.getElementById(
"successMessage"
).innerText=result.message;

document.getElementById(
"contactForm"
).reset();

}catch(error){

document.getElementById(
"successMessage"
).innerText="Error submitting contact form";

}

});


/* LEAD FORM */

document.getElementById("leadForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const data={
name:document.getElementById("leadName").value,
email:document.getElementById("leadEmail").value,
phone:document.getElementById("leadPhone").value,
company:document.getElementById("leadCompany").value
};

try{

const response=await fetch(
"http://localhost:5000/api/lead",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

const result=await response.json();

document.getElementById(
"leadMessage"
).innerText=result.message;

document.getElementById(
"leadForm"
).reset();

}catch(error){

document.getElementById(
"leadMessage"
).innerText="Error submitting lead";

}

});

</script>

</body>
</html>
